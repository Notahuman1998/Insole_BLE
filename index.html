<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Insole BLE Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        .sensor-dot { transition: background-color 0.1s linear, box-shadow 0.1s linear, transform 0.1s; }
        #insole-canvas { width: 100% !important; height: 300px !important; border-radius: 12px; }
    </style>
</head>
<body class="bg-slate-900 text-slate-200 min-h-screen p-4 md:p-8 font-sans">

    <header class="max-w-5xl mx-auto mb-8 flex justify-between items-end border-b border-slate-700 pb-4">
        <div>
            <h1 class="text-3xl font-bold text-white tracking-tight">Insole <span class="text-blue-500">BLE Telemetry</span></h1>
            <p class="text-slate-400 text-sm mt-1">100Hz Real-Time Bluetooth Stream</p>
        </div>
        
        <div class="flex items-center gap-4">
            <div class="flex items-center gap-2">
                <div id="status-dot" class="w-3 h-3 rounded-full bg-red-500"></div>
                <span id="status-text" class="text-sm font-medium text-red-400">Disconnected</span>
            </div>
            <button id="btn-connect" class="px-6 py-2 bg-blue-600 hover:bg-blue-500 text-white text-sm font-bold rounded shadow transition-colors">
                Pair with Insole
            </button>
        </div>
    </header>

    <main class="max-w-5xl mx-auto grid grid-cols-1 lg:grid-cols-3 gap-8">
        <section class="lg:col-span-1 bg-slate-800 rounded-2xl p-6 border border-slate-700 shadow-xl">
            <h2 class="text-xl font-semibold mb-6 flex items-center gap-2">
                <svg class="w-5 h-5 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                Pressure Matrix (Raw)
            </h2>

            <div class="relative w-full max-w-[200px] mx-auto aspect-[1/2] bg-slate-900 rounded-[60px] border-4 border-slate-700 p-4 shadow-inner mb-6">
                <div id="dot-0" class="sensor-dot absolute w-8 h-8 rounded-full bg-slate-700 border-2 border-slate-600 flex items-center justify-center text-xs font-bold top-[10%] right-[40%] transform translate-x-1/2">1</div>
                <div id="dot-1" class="sensor-dot absolute w-6 h-6 rounded-full bg-slate-700 border-2 border-slate-600 flex items-center justify-center text-[10px] font-bold top-[18%] left-[25%] transform -translate-x-1/2">2</div>
                <div id="dot-2" class="sensor-dot absolute w-8 h-8 rounded-full bg-slate-700 border-2 border-slate-600 flex items-center justify-center text-xs font-bold top-[30%] right-[50%] transform translate-x-1/2">3</div>
                <div id="dot-3" class="sensor-dot absolute w-7 h-7 rounded-full bg-slate-700 border-2 border-slate-600 flex items-center justify-center text-[10px] font-bold top-[35%] right-[22%] transform -translate-x-1/2">4</div>
                <div id="dot-4" class="sensor-dot absolute w-7 h-7 rounded-full bg-slate-700 border-2 border-slate-600 flex items-center justify-center text-xs font-bold top-[48%] right-[25%] transform translate-x-1/2">5</div>
                <div id="dot-5" class="sensor-dot absolute w-7 h-7 rounded-full bg-slate-700 border-2 border-slate-600 flex items-center justify-center text-xs font-bold top-[70%] left-[35%] transform translate-x-1/2">6</div>
                <div id="dot-6" class="sensor-dot absolute w-7 h-7 rounded-full bg-slate-700 border-2 border-slate-600 flex items-center justify-center text-xs font-bold top-[73%] right-[35%] transform -translate-x-1/2">7</div>
                <div id="dot-7" class="sensor-dot absolute w-8 h-8 rounded-full bg-slate-700 border-2 border-slate-600 flex items-center justify-center text-xs font-bold top-[82%] right-[42%] transform -translate-x-1/2">8</div>
            </div>

            <div class="grid grid-cols-2 gap-2 text-sm font-mono" id="fsr-values">
                </div>
        </section>

        <section class="lg:col-span-2 bg-slate-800 rounded-2xl p-6 border border-slate-700 shadow-xl">
            <div class="flex justify-between items-start mb-4">
                <div>
                    <h2 class="text-xl font-semibold flex items-center gap-2">
                        <svg class="w-5 h-5 text-purple-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 10l-2 1m0 0l-2-1m2 1v2.5M20 7l-2 1m2-1l-2-1m2 1v2.5M14 4l-2-1-2 1M4 7l2-1M4 7l2 1M4 7v2.5M12 21l-2-1m2 1l2-1m-2 1v-2.5M6 18l-2-1v-2.5M18 18l2-1v-2.5"></path></svg>
                        3D Insole Orientation
                    </h2>
                    <p class="text-slate-400 text-xs mt-1">Pitch and Roll from MPU6050</p>
                </div>
                <div class="text-right space-y-1">
                    <div class="bg-slate-900 px-3 py-1 rounded border border-slate-700"><span class="text-slate-500 text-sm">Pitch: </span><span id="pitch-val" class="text-blue-300 font-bold font-mono">0.0°</span></div>
                    <div class="bg-slate-900 px-3 py-1 rounded border border-slate-700"><span class="text-slate-500 text-sm">Roll: &nbsp;</span><span id="roll-val"  class="text-blue-300 font-bold font-mono">0.0°</span></div>
                    <div class="bg-slate-900 px-3 py-1 rounded border border-slate-700"><span class="text-slate-500 text-sm">Ping: &nbsp;</span><span id="ping-val"  class="text-green-400 font-bold font-mono">0 ms</span></div>
                </div>
            </div>
            <canvas id="insole-canvas"></canvas>
        </section>
    </main>

    <script>
        // --- UI Setup ---
        const fsrContainer = document.getElementById('fsr-values');
        for(let i=0; i<8; i++){
            fsrContainer.innerHTML += `<div class="bg-slate-900 p-2 rounded flex justify-between border border-slate-700"><span class="text-slate-500">CH${i+1}</span><span id="val-${i}" class="text-blue-300">0</span></div>`;
        }

        // --- 3D Setup (Reused your great Three.js code!) ---
        const canvas = document.getElementById('insole-canvas');
        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, canvas.clientWidth / 300, 0.1, 100);
        camera.position.set(2.5, 3, 5);
        camera.lookAt(0, 0, 0);

        scene.add(new THREE.AmbientLight(0xffffff, 0.4));
        const keyLight = new THREE.DirectionalLight(0x93c5fd, 1.2);
        keyLight.position.set(3, 6, 4); 
        scene.add(keyLight);

        const insoleGroup = new THREE.Group();
        insoleGroup.add(new THREE.Mesh(new THREE.BoxGeometry(1.6, 0.18, 3.2), new THREE.MeshPhongMaterial({ color:0x1d4ed8, transparent:true, opacity:0.92 })));
        const toe = new THREE.Mesh(new THREE.BoxGeometry(1.3,0.06,0.6), new THREE.MeshPhongMaterial({color:0x2563eb}));
        toe.position.set(0,0.12,-1.1); insoleGroup.add(toe);
        scene.add(insoleGroup);
        scene.add(new THREE.GridHelper(10,20,0x1e3a5f,0x1e293b).translateY(-1.2));

        renderer.setSize(canvas.clientWidth, 300, false);
        
        let targetPitch = 0, targetRoll = 0;
        function animate() {
            requestAnimationFrame(animate);
            insoleGroup.rotation.x += (targetPitch * Math.PI/180 - insoleGroup.rotation.x) * 0.12;
            insoleGroup.rotation.z += (-targetRoll * Math.PI/180 - insoleGroup.rotation.z) * 0.12;
            renderer.render(scene, camera);
        }
        animate();

        // --- BLE LOGIC ---
        const SERVICE_UUID = "4fafc201-1fb5-459e-8fcc-c5c9c331914b";
        const CHARACTERISTIC_UUID = "beb5483e-36e1-4688-b7f5-ea07361b26a8";
        
        let bluetoothDevice;
        let lastTimestamp = 0;

        document.getElementById('btn-connect').addEventListener('click', async () => {
            try {
                console.log('Requesting Bluetooth Device...');
                bluetoothDevice = await navigator.bluetooth.requestDevice({
                    filters: [{ name: 'SmartInsole_BLE' }],
                    optionalServices: [SERVICE_UUID]
                });

                bluetoothDevice.addEventListener('gattserverdisconnected', onDisconnected);

                document.getElementById('status-text').textContent = 'Connecting...';
                document.getElementById('status-dot').className = 'w-3 h-3 rounded-full bg-yellow-500 animate-pulse';

                console.log('Connecting to GATT Server...');
                const server = await bluetoothDevice.gatt.connect();

                console.log('Getting Service...');
                const service = await server.getPrimaryService(SERVICE_UUID);

                console.log('Getting Characteristic...');
                const characteristic = await service.getCharacteristic(CHARACTERISTIC_UUID);

                console.log('Starting Notifications...');
                await characteristic.startNotifications();
                characteristic.addEventListener('characteristicvaluechanged', handleNotifications);

                document.getElementById('status-text').textContent = 'Connected & Streaming';
                document.getElementById('status-dot').className = 'w-3 h-3 rounded-full bg-green-500';
                document.getElementById('btn-connect').classList.add('hidden');

            } catch(error) {
                console.error("Connection failed!", error);
                alert("Failed to connect: " + error);
                onDisconnected();
            }
        });

        function onDisconnected() {
            document.getElementById('status-text').textContent = 'Disconnected';
            document.getElementById('status-dot').className = 'w-3 h-3 rounded-full bg-red-500';
            document.getElementById('btn-connect').classList.remove('hidden');
        }

        // --- THE UNPACKER ---
        // This takes the 28 bytes of Hex and turns it back into your data!
        function handleNotifications(event) {
            const dataView = event.target.value;
            
            // 1. Read Timestamp (Offset 0, 4 bytes, Little-Endian)
            const timestamp = dataView.getUint32(0, true); 
            
            // Calculate actual ping/delta between packets
            if (lastTimestamp !== 0) {
                document.getElementById('ping-val').textContent = (timestamp - lastTimestamp) + " ms";
            }
            lastTimestamp = timestamp;

            // 2. Read Pitch and Roll (Offsets 4 and 8, 4 bytes each, floats)
            targetPitch = dataView.getFloat32(4, true);
            targetRoll = dataView.getFloat32(8, true);
            
            document.getElementById('pitch-val').textContent = targetPitch.toFixed(1) + '°';
            document.getElementById('roll-val').textContent = targetRoll.toFixed(1) + '°';

            // 3. Read 8 FSRs (Starts at Offset 12, 2 bytes each)
            for(let i=0; i<8; i++) {
                const fsrRaw = dataView.getUint16(12 + (i * 2), true);
                document.getElementById(`val-${i}`).textContent = fsrRaw;

                // Update the visual dot intensity
                const dot = document.getElementById(`dot-${i}`);
                if (fsrRaw > 100) { // Assuming a press drops resistance/raises raw ADC
                    let intensity = Math.min(1, fsrRaw / 3000); // Scale 0 to 1 based on ADC reading
                    dot.style.backgroundColor = `rgba(239,68,68,${0.3 + intensity*0.7})`;
                    dot.style.borderColor = `rgba(248,113,113,1)`;
                    dot.style.boxShadow = `0 0 ${15*intensity}px rgba(239,68,68,${intensity})`;
                    dot.style.transform = `scale(${1 + intensity*0.25})`;
                } else {
                    dot.style.backgroundColor = '';
                    dot.style.borderColor = '';
                    dot.style.boxShadow = 'none';
                    dot.style.transform = 'scale(1)';
                }
            }
        }
    </script>
</body>
</html>
